<html>
    <head>
        <title>main</title>

        <link rel="icon" type="image/x-icon" href="/images/images.ico">

        <meta property="og:type" content="article">

    <script>
        var currentseed = Date.now();
        function play(audio, loop, volume) {
            var audiov = new Audio(audio)
            audiov.loop = loop
            audiov.volume = volume <!-- max is 1 -->
            audiov.play()
        }
        function copy(text) {
            navigator.clipboard.writeText(text)
        }

        function shouldbeMine(x, y) {
            var v = Math.sin(x) * 10000;
            var b = Math.sin(y) * 10000;
            var n = v + b + Math.sin(currentseed)
            return n - Math.floor(n);
        }

        function revealwhatever(elem) {
            const element = elem.srcElement
            const isMine = element.getAttribute("mine") > 0.7434

            var extrathing = ""
            if (element.getAttribute("y") == 0) {extrathing="\n"}

            console.log(isMine)
            console.log(shouldbeMine(element.getAttribute("x"), element.getAttribute("y")) > 0.7434)

            if (isMine) {
                element.innerText = extrathing+"X "
                document.getElementById("gameplayContainer").remove()
                document.getElementById("starter").removeAttribute("hidden")
            } else {
                var totalMines = 0

                const posX = parseInt(element.getAttribute("x"));const posY = parseInt(element.getAttribute("y"))

                for (x=-1;x<=1;x++) {
                    for (y=-1;y<=1;y++) {
                        posX+x + " : " + posY+y
                        if (shouldbeMine(posX+x, posY+y) > 0.7434) {totalMines=totalMines+1; console.log("yeah")}
                    }
                }

                element.innerText = extrathing+totalMines+" "
            }
        }

        function start() {
            currentseed = Date.now();
            document.getElementById("starter").setAttribute("hidden", "")
            const contain = document.createElement("div")
            contain.id = "gameplayContainer"
            document.getElementById("buttonsa").appendChild(contain)
            for (x=0;x<16;x++) {
                for (y=0;y<16;y++) {
                    const ele = document.createElement("a")

                    ele.innerText = "# "

                    ele.setAttribute("mine", shouldbeMine(x, y));ele.setAttribute("x", x);ele.setAttribute("y", y)
                    
                    ele.addEventListener("click", revealwhatever)
                    
                    if (y == 0) {ele.innerText = '\n'+ele.innerText}

                    contain.appendChild(ele)
                }
            }
        }
    </script>
    <style>

    </style>
    <body class="main"> 
        <div class="bg"></div>
        <div class='center tex2' id="buttonsa">
            <b onclick=start() id="starter">start</b>
        </div>
